<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:transparent;overflow:hidden;user-select:none}
canvas{display:block;position:absolute;top:0;left:0;image-rendering:pixelated;image-rendering:crisp-edges}
#shop-btn{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);background:#2A1406;border:1px solid #6A3A18;color:#F0C060;font:10px/1 'Courier New',monospace;padding:4px 12px;cursor:pointer;z-index:50;letter-spacing:1px;white-space:nowrap}
#shop-btn:hover{background:#3A1E0A}
#shop{position:fixed;bottom:0;left:0;width:100%;background:rgba(10,5,2,0.97);border-top:2px solid #7A4A20;padding:6px 8px;z-index:60;transform:translateY(110%);transition:transform 0.25s cubic-bezier(0.25,0.46,0.45,0.94);pointer-events:none;max-height:70vh;overflow-y:auto}
#shop.open{transform:translateY(0);pointer-events:auto}
#shop-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
#colony-name{color:#F8CC18;font:bold 10px 'Courier New',monospace;letter-spacing:2px}
#shop-close{background:#3A1E08;border:1px solid #6A3A18;color:#F0C060;cursor:pointer;padding:1px 6px;font-size:10px}
#shop-meta{display:flex;gap:12px;margin-bottom:5px;font:8px 'Courier New',monospace}
#shop-food{color:#F8D820}#shop-rj{color:#CC66FF}
#shop-tabs{display:flex;gap:3px;margin-bottom:6px}
.tab-btn{background:#1E0E06;border:1px solid #4A2810;color:#A08060;font:7px 'Courier New',monospace;cursor:pointer;padding:3px 8px;letter-spacing:1px}
.tab-btn.active{background:#3A1E08;border-color:#F8CC18;color:#F8CC18}
#tab-content{min-height:80px}
.upg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.ant-grid{display:grid;grid-template-columns:repeat(1,1fr);gap:3px}
.res-grid{display:grid;grid-template-columns:repeat(1,1fr);gap:3px}
.upg-btn,.ant-btn,.res-btn{background:#1E0E06;border:1px solid #4A2810;color:#C8A070;font:7px/1.3 'Courier New',monospace;cursor:pointer;padding:4px 3px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:background 0.1s}
.upg-btn{height:52px}
.ant-btn{height:36px;flex-direction:row;justify-content:flex-start;gap:6px;padding:4px 8px}
.res-btn{height:40px;flex-direction:row;justify-content:flex-start;gap:6px;padding:4px 8px}
.upg-btn:hover:not(.maxed):not(.locked),.ant-btn:hover:not(.locked),.res-btn:hover:not(.done),.res-btn:hover:not(.locked){background:#2E1A0A;border-color:#7A4828}
.upg-btn.maxed{background:#0A1E0A;border-color:#2A5A2A;color:#5AAA5A;cursor:default}
.res-btn.done{background:#0A1E0A;border-color:#2A5A2A;color:#5AAA5A;cursor:default}
.locked{opacity:0.4;cursor:not-allowed}
.btn-icon{font-size:13px;line-height:1}
.btn-label{display:flex;flex-direction:column;align-items:flex-start;gap:1px}
.btn-name{font-size:7px;color:#E0C090}
.btn-desc{font-size:6px;color:#A08060}
.btn-cost{font-size:7px;color:#F8D820}
.upg-icon{font-size:13px;line-height:1;display:block}
.upg-name{font-size:6.5px;color:#E0C090}
.upg-desc{font-size:6px;color:#A08060}
.upg-cost{font-size:7px;color:#F8D820}
#evt-overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:70;pointer-events:none}
#evt-overlay.show{pointer-events:auto}
#evt-box{background:rgba(8,4,2,0.96);border:2px solid #7A4A20;padding:12px 16px;text-align:center;min-width:180px;max-width:240px;transform:translateY(-18px) scale(0.88);opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);cursor:pointer}
#evt-overlay.show #evt-box{transform:translateY(0) scale(1);opacity:1}
#evt-overlay.good #evt-box{border-color:#3A8A3A;box-shadow:0 0 18px rgba(80,200,80,0.2)}
#evt-overlay.bad #evt-box{border-color:#8A2A2A;box-shadow:0 0 18px rgba(200,60,60,0.2)}
#evt-icon{font-size:28px;display:block;margin-bottom:5px}
#evt-name{font:bold 10px/1.2 'Courier New',monospace;color:#F0D090;letter-spacing:1px;display:block;margin-bottom:4px}
#evt-desc{font:8px/1.5 'Courier New',monospace;color:#B09060;display:block;margin-bottom:7px}
#evt-bar{height:3px;background:#2A1808;border-radius:2px;overflow:hidden}
#evt-fill{height:100%;background:#6A4028;transition:width 0.1s linear;width:100%}
#evt-overlay.good #evt-fill{background:#3A7A3A}
#evt-overlay.bad #evt-fill{background:#7A2A2A}
#prestige-overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:80;background:rgba(0,0,0,0.7);display:none}
#prestige-overlay.show{display:flex}
#prestige-box{background:#0C0604;border:2px solid #F8CC18;padding:16px 20px;text-align:center;max-width:220px}
#prestige-box h3{color:#F8CC18;font:bold 11px 'Courier New',monospace;letter-spacing:2px;margin-bottom:8px}
#prestige-box p{color:#C0A060;font:8px 'Courier New',monospace;line-height:1.5;margin-bottom:10px}
.prestige-btn{background:#2A1008;border:1px solid #F8CC18;color:#F8CC18;font:bold 9px 'Courier New',monospace;padding:4px 12px;cursor:pointer;margin:0 4px}
.prestige-btn:hover{background:#3A1808}
.cancel-btn{border-color:#6A3A18;color:#A08060}
#toast{position:fixed;top:26px;left:50%;transform:translateX(-50%);background:rgba(248,216,32,0.95);color:#2A1506;font:bold 8px 'Courier New',monospace;padding:3px 10px;white-space:nowrap;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:90;letter-spacing:1px}
#toast.show{opacity:1}
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="shop-btn">&#x1FA99; SHOP</button>
<div id="shop">
  <div id="shop-header">
    <span id="colony-name">COLONY SHOP</span>
    <button id="shop-close">&#x2715;</button>
  </div>
  <div id="shop-meta">
    <span id="shop-food">&#x1F34E; 0 food</span>
    <span id="shop-rj">&#x1F49C; 0 RJ</span>
  </div>
  <div id="shop-tabs">
    <button class="tab-btn active" onclick="setTab('upgrades')">UPGRADES</button>
    <button class="tab-btn" onclick="setTab('ants')">ANT TYPES</button>
    <button class="tab-btn" onclick="setTab('research')">RESEARCH</button>
  </div>
  <div id="tab-content"></div>
</div>
<div id="evt-overlay">
  <div id="evt-box">
    <span id="evt-icon"></span><span id="evt-name"></span>
    <span id="evt-desc"></span>
    <div id="evt-bar"><div id="evt-fill"></div></div>
  </div>
</div>
<div id="prestige-overlay">
  <div id="prestige-box">
    <h3>&#x1F31F; MIGRATE COLONY?</h3>
    <p>Reset food, ants &amp; upgrades.<br>Keep research &amp; &#xD7;1.5 permanent bonus.</p>
    <button class="prestige-btn" onclick="doPrestige()">MIGRATE</button>
    <button class="prestige-btn cancel-btn" onclick="hidePrestige()">CANCEL</button>
  </div>
</div>
<div id="toast"></div>
<script>
'use strict';


// ── Constants & canvas setup ─────────────────────────────────
const VW=135,VH=170;
let SCALE=2;
const canvas=document.getElementById('c');
const dctx=canvas.getContext('2d');
const vc=new OffscreenCanvas(VW,VH);
const vctx=vc.getContext('2d');

function resizeCanvas(){
  SCALE=Math.min(window.innerWidth/VW,window.innerHeight/VH);
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

// ── Upgrade defs ─────────────────────────────────────────────
const UPGRADES=[
  {id:'speed',icon:'⚡',name:'SPEED',desc:'Ants move faster',costs:[30,80,200],effect:'×1.3 speed'},
  {id:'carry',icon:'🌿',name:'CARRY',desc:'More food per trip',costs:[50,130,300],effect:'+1 food/trip'},
  {id:'antMax',icon:'🐜',name:'CAPACITY',desc:'Higher ant limit',costs:[40,100,250],effect:'+5 max ants'},
  {id:'sniffer',icon:'👃',name:'SNIFFER',desc:'Food found faster',costs:[60,150,350],effect:'×1.4 food rate'},
  {id:'queenBoost',icon:'👑',name:'QUEEN',desc:'Queen lays faster',costs:[80,200,500],effect:'×1.3 hatch rate'},
  {id:'soldier',icon:'🛡️',name:'SOLDIER',desc:'Reduce raid damage',costs:[100,250,600],effect:'-15% raid dmg'},
];

// ── Research defs ─────────────────────────────────────────────
const RESEARCH=[
  {id:'pheromone',icon:'🔮',name:'PHEROMONE TRAILS',desc:'Workers go direct to food',cost:1},
  {id:'incubation',icon:'🥚',name:'EGG INCUBATION',desc:'Hatch every 12 food (was 18)',cost:1},
  {id:'deepMine',icon:'⛏️',name:'DEEP MINING',desc:'Unlock clay layer',cost:2},
  {id:'crystalEx',icon:'💎',name:'CRYSTAL EXCAVATION',desc:'Unlock crystal layer',cost:3},
  {id:'memory',icon:'🧠',name:'COLONY MEMORY',desc:'Keep 25% food on prestige',cost:2},
];

// ── Ant type defs ─────────────────────────────────────────────
const ANT_TYPES=[
  {id:'scout',icon:'🟡',name:'SCOUT',desc:'30% faster, marks food',cost:120,color:[220,200,0],max:5},
  {id:'soldier',icon:'🔴',name:'SOLDIER',desc:'-10% raid dmg each (max 5)',cost:150,color:[200,40,40],max:5},
  {id:'nurse',icon:'🟣',name:'NURSE',desc:'-10% hatch threshold each',cost:200,color:[160,60,200],max:5},
  {id:'builder',icon:'⚫',name:'BUILDER',desc:'Auto-digs tunnel every 60s',cost:180,color:[80,80,80],max:5},
  {id:'farmer',icon:'🟢',name:'FARMER',desc:'+0.5 food/sec passive each',cost:250,color:[40,160,40],max:5},
];

// ── State ─────────────────────────────────────────────────────
const SAVE_KEY='antColony_v4';
const COLONY_TITLES=['Nest','Burrow','Colony','Hive','Empire','Supercolony','LEGEND'];

function defState(){return{
  food:0,totalFood:0,antCount:3,
  upg:{speed:0,carry:0,antMax:0,sniffer:0,queenBoost:0,soldier:0},
  antTypes:{scout:0,soldier:0,nurse:0,builder:0,farmer:0},
  research:{pheromone:false,incubation:false,deepMine:false,crystalEx:false,memory:false},
  royalJelly:0,prestige:0,layer:0,
  mult:1,multTimer:0,queenTimer:0,eventTimer:Math.random()*18+12,
  permMult:1,rainTimer:0,builderTimer:0,farmerTimer:0,
};}

let S=defState();

function saveState(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(S));}catch(e){}}
function loadState(){
  try{
    const d=localStorage.getItem(SAVE_KEY);
    if(d){
      const p=JSON.parse(d);
      S=Object.assign(defState(),p);
      S.upg=Object.assign(defState().upg,p.upg||{});
      S.antTypes=Object.assign(defState().antTypes,p.antTypes||{});
      S.research=Object.assign(defState().research,p.research||{});
    }
  }catch(e){S=defState();}
}
loadState();
setInterval(saveState,10000);


// ── Events (16 total) ─────────────────────────────────────────
const EVENTS=[
  {id:'raid',icon:'🐛',name:'APHID RAID',desc:'Lost 20% food!',type:'bad',
   fn:()=>{S.food=Math.floor(S.food*Math.max(0.2,0.8-S.antTypes.soldier*0.1-(S.upg.soldier||0)*0.15));showToast('RAID!')}},
  {id:'feast',icon:'🍎',name:'FRUIT FALL',desc:'+60 food windfall!',type:'good',
   fn:()=>{addFood(60);}},
  {id:'rain',icon:'🌧️',name:'RAIN',desc:'Ants slow for 30s',type:'bad',
   fn:()=>{S.rainTimer=30;}},
  {id:'rjdrop',icon:'💜',name:'ROYAL JELLY',desc:'+1 Royal Jelly!',type:'good',
   fn:()=>{S.royalJelly+=1;showToast('+1 RJ!');}},
  {id:'stampede',icon:'🦶',name:'BOOT STOMP',desc:'Lost 2 ants!',type:'bad',
   fn:()=>{S.antCount=Math.max(1,S.antCount-2);syncAnts();}},
  {id:'migration',icon:'🦋',name:'BUTTERFLY SIGHTING',desc:'×2 food for 20s!',type:'good',
   fn:()=>{S.mult=2;S.multTimer=20;}},
  {id:'fungus',icon:'🍄',name:'FUNGUS BLOOM',desc:'+40 food!',type:'good',
   fn:()=>{addFood(40);}},
  {id:'anthill',icon:'🏔️',name:'ANTHILL SURGE',desc:'+3 ants free!',type:'good',
   fn:()=>{S.antCount=Math.min(getAntMax(),S.antCount+3);syncAnts();}},
  {id:'drought',icon:'☀️',name:'DROUGHT',desc:'Food spots shrink for 60s',type:'bad',
   fn:()=>{droughtTimer=60;}},
  {id:'eggcache',icon:'🥚',name:'EGG CACHE',desc:'+5 free ants!',type:'good',
   fn:()=>{S.antCount=Math.min(getAntMax(),S.antCount+5);syncAnts();}},
  {id:'aphidfarm',icon:'🐛',name:'APHID FARM',desc:'+3 food/s for 45s!',type:'good',
   fn:()=>{aphidTimer=45;}},
  {id:'meteor',icon:'💫',name:'METEOR FRAGMENT',desc:'+500 food +1 RJ!',type:'good',
   fn:()=>{addFood(500);S.royalJelly+=1;showToast('+500 food +1 RJ!');}},
  {id:'beetle',icon:'🪲',name:'BEETLE ATTACK',desc:'Lost 2 ants + 15% food',type:'bad',
   fn:()=>{
     const soldierCount=S.antTypes.soldier||0;
     if(soldierCount===0){S.antCount=Math.max(1,S.antCount-2);syncAnts();}
     S.food=Math.floor(S.food*0.85);showToast('BEETLE ATTACK!');
   }},
  {id:'windfall',icon:'🌟',name:'LUCKY FIND',desc:'×3 food for 15s!',type:'good',
   fn:()=>{S.mult=3;S.multTimer=15;}},
  {id:'collapse',icon:'💥',name:'TUNNEL COLLAPSE',desc:'Lost 3 ants!',type:'bad',
   fn:()=>{S.antCount=Math.max(1,S.antCount-3);syncAnts();}},
  {id:'queengift',icon:'👑',name:'QUEEN GIFT',desc:'+2 RJ + hatch boost!',type:'good',
   fn:()=>{S.royalJelly+=2;S.queenTimer=0;showToast('+2 RJ! Queen pleased!');}},
];

let droughtTimer=0,aphidTimer=0;

// ── Tunnel graph ──────────────────────────────────────────────
const SURFACE_Y=42;
let nodes=[
  {x:67,y:SURFACE_Y},{x:67,y:55},{x:55,y:65},{x:78,y:65},
  {x:45,y:78},{x:67,y:80},{x:88,y:75},
  {x:38,y:95},{x:55,y:100},{x:78,y:98},{x:100,y:88},
  {x:30,y:115},{x:50,y:122},{x:68,y:118},{x:85,y:115},{x:108,y:105},
  {x:25,y:138},{x:45,y:145},{x:68,y:140},{x:90,y:138},{x:112,y:130},
];
let edges=[
  [0,1],[1,2],[1,3],[2,4],[3,6],[2,5],[3,5],
  [4,7],[5,8],[5,9],[6,10],
  [7,11],[8,12],[9,13],[10,15],
  [11,16],[12,17],[13,18],[14,19],[15,20],
];
const QUEEN_NODE=0;

function addTunnel(){
  const tips=[];
  const connected=new Set(edges.flat());
  nodes.forEach((n,i)=>{
    if(n.y>SURFACE_Y+10){
      const deg=edges.filter(e=>e[0]===i||e[1]===i).length;
      if(deg<=2)tips.push(i);
    }
  });
  const base=tips[Math.floor(Math.random()*tips.length)]??nodes.length-1;
  const bn=nodes[base];
  const nx=Math.max(8,Math.min(VW-8,bn.x+(Math.random()*30-15)));
  const ny=Math.min(VH-8,bn.y+(Math.random()*20+10));
  nodes.push({x:nx,y:ny});
  edges.push([base,nodes.length-1]);
}

// ── Food spots ────────────────────────────────────────────────
const MAX_FOOD_SPOTS=6;
let foodSpots=[];
function spawnFood(){
  if(foodSpots.length>=(droughtTimer>0?3:MAX_FOOD_SPOTS))return;
  foodSpots.push({
    x:Math.random()*(VW-20)+10,
    y:Math.random()*(SURFACE_Y-8)+4,
    v:0,
  });
}
for(let i=0;i<3;i++)spawnFood();


// ── Helper calcs ──────────────────────────────────────────────
function getAntMax(){return 10+(S.upg.antMax||0)*5;}
function getSpeed(){
  let sp=0.55+(S.upg.speed||0)*0.18;
  if(S.rainTimer>0)sp*=0.55;
  const sc=S.antTypes.scout||0;
  return sp*(1+sc*0.1);
}
function getCarry(){return 1+(S.upg.carry||0);}
function getHatchCost(){
  let base=S.research.incubation?12:18;
  const nurses=S.antTypes.nurse||0;
  return Math.max(4,base-nurses*Math.floor(base*0.1));
}

function addFood(n){
  const gain=n*S.mult*S.permMult*(1+S.antTypes.farmer*0.1);
  S.food+=gain;S.totalFood+=gain;
  checkPrestigePrompt();
}

function checkPrestigePrompt(){
  if(S.totalFood>=8000&&!prestigeShown){
    prestigeShown=true;
    document.getElementById('prestige-overlay').classList.add('show');
  }
}
let prestigeShown=S.prestige>0||S.totalFood>=8000;

// ── Ant class ─────────────────────────────────────────────────
class Ant{
  constructor(type='worker'){
    this.type=type;
    const n=nodes[QUEEN_NODE];
    this.x=n.x+(Math.random()*6-3);
    this.y=n.y+(Math.random()*6-3);
    this.vx=0;this.vy=0;
    this.state='WANDER';
    this.nodeIdx=QUEEN_NODE;
    this.targetNode=null;
    this.targetFood=null;
    this.carry=0;
    this.wanderT=Math.random()*3;
    this.facing=1;
    this.legAnim=Math.random()*Math.PI*2;
  }

  pickNextNode(prefer){
    const adj=edges
      .filter(e=>e[0]===this.nodeIdx||e[1]===this.nodeIdx)
      .map(e=>e[0]===this.nodeIdx?e[1]:e[0]);
    if(!adj.length)return this.nodeIdx;
    if(prefer==='up'){
      const up=adj.filter(i=>nodes[i].y<nodes[this.nodeIdx].y);
      if(up.length)return up[Math.floor(Math.random()*up.length)];
    }
    if(prefer==='down'){
      const dn=adj.filter(i=>nodes[i].y>nodes[this.nodeIdx].y);
      if(dn.length)return dn[Math.floor(Math.random()*dn.length)];
    }
    return adj[Math.floor(Math.random()*adj.length)];
  }

  update(dt){
    this.legAnim+=dt*8;
    const spd=getSpeed()*(this.type==='scout'?1.3:1)*50;
    const n=nodes[this.nodeIdx];

    if(this.state==='WANDER'){
      this.wanderT-=dt;
      if(this.wanderT<=0){
        if(foodSpots.length&&Math.random()<0.7){
          this.state='TO_FOOD';
          if(S.research.pheromone||this.type==='scout'){
            const f=foodSpots.reduce((a,b)=>{
              const da=(a.x-n.x)**2+(a.y-n.y)**2;
              const db=(b.x-n.x)**2+(b.y-n.y)**2;
              return da<db?a:b;
            });
            this.targetFood=f;
          }else{
            this.targetFood=foodSpots[Math.floor(Math.random()*foodSpots.length)];
          }
          this.targetNode=this.pickNextNode('up');
        }else{
          this.targetNode=this.pickNextNode(Math.random()<0.5?'up':'down');
          this.wanderT=Math.random()*2+0.5;
        }
      }
      if(this.targetNode!==null){
        const tn=nodes[this.targetNode];
        const dx=tn.x-this.x,dy=tn.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<1.5){this.x=tn.x;this.y=tn.y;this.nodeIdx=this.targetNode;this.targetNode=null;}
        else{this.x+=dx/d*spd*dt;this.y+=dy/d*spd*dt;if(dx!==0)this.facing=dx>0?1:-1;}
      }
    }

    else if(this.state==='TO_FOOD'){
      const tf=this.targetFood;
      if(!tf||!foodSpots.includes(tf)){this.state='WANDER';this.targetFood=null;return;}
      if(this.y>SURFACE_Y+2&&this.nodeIdx!==QUEEN_NODE){
        this.targetNode=this.pickNextNode('up');
      }
      if(this.targetNode!==null){
        const tn=nodes[this.targetNode];
        const dx=tn.x-this.x,dy=tn.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<1.5){this.x=tn.x;this.y=tn.y;this.nodeIdx=this.targetNode;this.targetNode=null;}
        else{this.x+=dx/d*spd*dt;this.y+=dy/d*spd*dt;if(dx!==0)this.facing=dx>0?1:-1;}
      }else{
        const dx=tf.x-this.x,dy=tf.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<3){
          this.carry=getCarry();
          const idx=foodSpots.indexOf(tf);
          if(idx>=0)foodSpots.splice(idx,1);
          this.targetFood=null;this.state='TO_QUEEN';
          this.targetNode=this.pickNextNode('down');
        }else{this.x+=dx/d*spd*dt;this.y+=dy/d*spd*dt;if(dx!==0)this.facing=dx>0?1:-1;}
      }
    }

    else if(this.state==='TO_QUEEN'){
      if(this.nodeIdx!==QUEEN_NODE){
        if(this.targetNode===null)this.targetNode=this.pickNextNode('down');
        const tn=nodes[this.targetNode];
        const dx=tn.x-this.x,dy=tn.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<1.5){this.x=tn.x;this.y=tn.y;this.nodeIdx=this.targetNode;
          if(this.nodeIdx===QUEEN_NODE){this.targetNode=null;}
          else{this.targetNode=this.pickNextNode('down');}
        }else{this.x+=dx/d*spd*dt;this.y+=dy/d*spd*dt;if(dx!==0)this.facing=dx>0?1:-1;}
      }else{
        const dx=n.x-this.x,dy=n.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<2){
          addFood(this.carry);this.carry=0;this.state='WANDER';this.wanderT=Math.random()*2+1;
        }else{this.x+=dx/d*spd*dt;this.y+=dy/d*spd*dt;}
      }
    }
  }
}

let ants=[];

  while(ants.length<S.antCount){
    const types=['worker','worker','worker','scout','soldier','nurse','builder','farmer'];

}

// ── Draw helpers ──────────────────────────────────────────────
function drawAntVc(ax,ay,facing,legAnim,color,carry){
  const c=vctx;
  c.save();c.translate(ax,ay);if(facing<0)c.scale(-1,1);
  const [r,g,b]=color||[90,55,20];
  const col=`rgb(${r},${g},${b})`;
  const dark=`rgb(${Math.floor(r*0.6)},${Math.floor(g*0.6)},${Math.floor(b*0.6)})`;
  // legs
  c.fillStyle=col;
  const lp=Math.sin(legAnim);
  const lpts=[[-3,-1],[-3,1],[-2,0],[-2,2],[2,-1],[2,1],[3,0],[3,2]];
  lpts.forEach(([lx,ly])=>c.fillRect(lx,ly+lp,1,1));
  // body
  c.fillStyle=col;c.fillRect(-5,-1,4,3);
  c.fillStyle=dark;c.fillRect(-4,1,2,1);
  c.fillRect(-1,-1,4,3);c.fillStyle=col;c.fillRect(0,-2,2,4);
  c.fillRect(3,-1,3,3);c.fillStyle=dark;c.fillRect(3,1,2,1);
  // head
  c.fillStyle=col;c.fillRect(5,-1,2,2);
  // antennae
  c.fillRect(6,-2,1,1);c.fillRect(7,-3,1,1);
  c.fillRect(6,2,1,1);c.fillRect(7,3,1,1);
  if(carry){c.fillStyle='#90EE90';c.fillRect(-6,-2,2,2);}
  c.restore();
}

function drawQueenVc(qx,qy,legAnim){
  const c=vctx;
  c.save();c.translate(qx,qy);
  c.fillStyle='#D4A017';
  for(let i=0;i<3;i++)c.fillRect(-8+i*6,-1,5,3);
  c.fillStyle='#F8CC18';c.fillRect(0,-2,3,5);
  // crown
  c.fillStyle='#F8CC18';c.fillRect(-1,-4,5,2);
  c.fillRect(-2,-3,1,1);c.fillRect(3,-3,1,1);c.fillRect(1,-5,1,1);
  c.restore();
}

let sparkles=[];
function renderWorld(){
  const c=vctx;
  c.clearRect(0,0,VW,VH);

  // Sky gradient
  c.fillStyle='#87CEEB';c.fillRect(0,0,VW,SURFACE_Y);
  c.fillStyle='#A8D8EA';c.fillRect(0,SURFACE_Y-6,VW,6);

  // Clouds
  c.fillStyle='rgba(255,255,255,0.7)';
  [[20,10,14,6],[70,7,18,7],[110,12,12,5]].forEach(([cx,cy,w,h])=>{
    c.fillRect(cx,cy,w,h);c.fillRect(cx-3,cy+2,w+6,h-2);
  });

  // Underground layers
  const layer=S.layer;
  let soilCol='#5C3A1E',soilDark='#3A2010';
  if(layer>=2&&S.research.crystalEx){soilCol='#2A1840';soilDark='#1A0C28';}
  else if(layer>=1&&S.research.deepMine){soilCol='#7A3A10';soilDark='#5A2A08';}
  c.fillStyle=soilCol;c.fillRect(0,SURFACE_Y,VW,VH-SURFACE_Y);

  // Soil texture dots
  c.fillStyle=soilDark;
  for(let tx=3;tx<VW;tx+=7)for(let ty=SURFACE_Y+4;ty<VH;ty+=6)c.fillRect(tx,ty,1,1);

  // Crystal sparkles (layer 2)
  if(layer>=2&&S.research.crystalEx){
    c.fillStyle='#6644AA';
    for(let tx=8;tx<VW;tx+=12)for(let ty=SURFACE_Y+20;ty<VH;ty+=10){c.fillRect(tx,ty,2,3);c.fillRect(tx+1,ty-1,1,5);}
    // animated sparkles
    if(Math.random()<0.08)sparkles.push({x:Math.random()*(VW-20)+5,y:SURFACE_Y+Math.random()*(VH-SURFACE_Y-10)+10,t:0.6});
    sparkles=sparkles.filter(s=>{
      s.t-=0.016;
      const a=Math.floor(s.t/0.6*255);
      c.fillStyle=`rgba(200,180,255,${s.t/0.6})`;
      c.fillRect(s.x-1,s.y,3,1);c.fillRect(s.x,s.y-1,1,3);
      return s.t>0;
    });
  }

  // Tunnel edges
  c.fillStyle=soilCol;
  edges.forEach(([a,b])=>{
    const na=nodes[a],nb=nodes[b];
    const dx=nb.x-na.x,dy=nb.y-na.y,d=Math.sqrt(dx*dx+dy*dy);
    const steps=Math.ceil(d);
    for(let i=0;i<=steps;i++){
      const t=i/steps;
      const tx=na.x+dx*t,ty=na.y+dy*t;
      const col=(ty>SURFACE_Y+60&&layer>=2&&S.research.crystalEx)?'#3A2460':
                (ty>SURFACE_Y+40&&layer>=1&&S.research.deepMine)?'#5A2808':'#8B5A2B';
      c.fillStyle=col;
      c.fillRect(tx-2,ty-2,5,5);
    }
  });

  // Food spots
  const sniferMult=1+(S.upg.sniffer||0)*0.1;
  if(Math.random()<0.008*sniferMult)spawnFood();
  foodSpots.forEach(f=>{
    f.v=(f.v||0)+0.2;
    c.fillStyle='#2D7A1E';c.fillRect(f.x-2,f.y-2,5,5);
    c.fillStyle='#5AAA30';c.fillRect(f.x-1,f.y-1,3,3);
    c.fillStyle='#90EE50';c.fillRect(f.x,f.y,1,1);
  });

  // Aphid farm node
  if(aphidTimer>0){
    c.fillStyle='rgba(180,255,100,0.6)';
    c.fillRect(VW/2-8,SURFACE_Y-15,16,12);
    c.fillStyle='#80DD40';c.fillRect(VW/2-4,SURFACE_Y-13,8,8);
  }

  // Draw ants (special types get colour dot)
  ants.forEach(a=>{
    const typeInfo=ANT_TYPES.find(t=>t.id===a.type);
    const col=typeInfo?typeInfo.color:[90,55,20];
    drawAntVc(a.x,a.y,a.facing,a.legAnim,col,a.carry>0);
  });

  // Draw special type dots above special ants
  ants.forEach(a=>{
    if(a.type!=='worker'){
      const typeInfo=ANT_TYPES.find(t=>t.id===a.type);
      if(typeInfo){
        const [r,g,b]=typeInfo.color;
        c.fillStyle=`rgb(${r},${g},${b})`;
        c.fillRect(a.x-1,a.y-5,2,2);
      }
    }
  });

  // Queen
  const qn=nodes[QUEEN_NODE];
  drawQueenVc(qn.x,qn.y,Date.now()/200);

  // Layer indicator strip (right side)
  const layerNames=['SOIL','CLAY','CRYSTAL'];
  const layerCols=['#8B5A2B','#C05A20','#5A30A0'];
  const lIdx=layer>=2&&S.research.crystalEx?2:layer>=1&&S.research.deepMine?1:0;
  c.fillStyle=layerCols[lIdx];c.fillRect(VW-6,SURFACE_Y,6,VH-SURFACE_Y);
  c.fillStyle='rgba(0,0,0,0.4)';
  for(let i=1;i<3;i++)c.fillRect(VW-6,SURFACE_Y+Math.floor((VH-SURFACE_Y)*i/3),6,1);
}

};

function drawPixelText(c,px,py,text,scale,color){
  c.fillStyle=color||'#FFFFFF';
  let cx=px;
  for(const ch of text.toUpperCase()){
    const glyph=FONT5[ch];
    if(!glyph){cx+=scale*2;continue;}
    for(let row=0;row<glyph.length;row++){
      for(let col=0;col<glyph[row].length;col++){
        if(glyph[row][col])c.fillRect(cx+col,py+row,1,1);
      }
    }
    cx+=4;
  }
}


// ── Shop UI ───────────────────────────────────────────────────
let currentTab='upgrades';
window.setTab=function(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['upgrades','ants','research'][i]===tab);
  });
  updateShopUI();
};

function updateShopUI(){
  const el=document.getElementById('tab-content');
  document.getElementById('shop-food').textContent=`🍎 ${Math.floor(S.food)} food`;
  document.getElementById('shop-rj').textContent=`💜 ${S.royalJelly} RJ`;
  if(currentTab==='upgrades') el.innerHTML=buildUpgradesTab();
  else if(currentTab==='ants') el.innerHTML=buildAntsTab();
  else el.innerHTML=buildResearchTab();
}

function buildUpgradesTab(){
  let h='<div class="upg-grid">';
  UPGRADES.forEach(u=>{
    const lvl=S.upg[u.id]||0;
    const maxLvl=u.costs.length;
    const maxed=lvl>=maxLvl;
    const cost=maxed?0:u.costs[lvl];
    const canAfford=S.food>=cost;
    const cls=maxed?'upg-btn maxed':(canAfford?'upg-btn':'upg-btn locked');
    const costText=maxed?'MAXED':`${cost}🍎`;
    h+=`<button class="${cls}" onclick="buyUpgrade('${u.id}')">
      <span class="upg-icon">${u.icon}</span>
      <span class="upg-name">${u.name}</span>
      <span class="upg-desc">Lv${lvl}/${maxLvl}</span>
      <span class="upg-cost">${costText}</span>
    </button>`;
  });
  h+='</div>';
  // Add tunnel button
  const tc=Math.floor(60+nodes.length*8);
  const canTunnel=S.food>=tc;
  h+=`<div style="margin-top:5px"><button class="${canTunnel?'res-btn':'res-btn locked'}" style="width:100%;height:32px" onclick="buyTunnel()">
    <span class="btn-icon">⛏️</span>
    <span class="btn-label"><span class="btn-name">DIG TUNNEL</span><span class="btn-cost">${tc}🍎</span></span>
  </button></div>`;
  return h;
}

function buildAntsTab(){
  let h='<div class="ant-grid">';
  ANT_TYPES.forEach(t=>{
    const owned=S.antTypes[t.id]||0;
    const maxed=owned>=t.max;
    const canAfford=S.food>=t.cost;
    const cls=maxed?'ant-btn locked':(canAfford?'ant-btn':'ant-btn locked');
    h+=`<button class="${cls}" onclick="buyAntType('${t.id}')">
      <span class="btn-icon">${t.icon}</span>
      <span class="btn-label">
        <span class="btn-name">${t.name} (${owned}/${t.max})</span>
        <span class="btn-desc">${t.desc}</span>
        <span class="btn-cost">${maxed?'MAXED':t.cost+'🍎'}</span>
      </span>
    </button>`;
  });
  h+='</div>';
  return h;
}

function buildResearchTab(){
  let h='<div class="res-grid">';
  RESEARCH.forEach(r=>{
    const done=S.research[r.id];
    const canAfford=S.royalJelly>=r.cost;
    const cls=done?'res-btn done':(canAfford?'res-btn':'res-btn locked');
    h+=`<button class="${cls}" onclick="buyResearch('${r.id}')">
      <span class="btn-icon">${r.icon}</span>
      <span class="btn-label">
        <span class="btn-name">${r.name}</span>
        <span class="btn-desc">${r.desc}</span>
        <span class="btn-cost">${done?'DONE':r.cost+'💜'}</span>
      </span>
    </button>`;
  });
  h+='</div>';
  return h;
}

window.buyUpgrade=function(id){
  const u=UPGRADES.find(x=>x.id===id);if(!u)return;
  const lvl=S.upg[id]||0;
  if(lvl>=u.costs.length)return;
  const cost=u.costs[lvl];
  if(S.food<cost)return;
  S.food-=cost;S.upg[id]=(lvl+1);
  showToast(`${u.name} Lv${S.upg[id]}!`);
  updateShopUI();
};

window.buyTunnel=function(){
  const tc=Math.floor(60+nodes.length*8);
  if(S.food<tc)return;
  S.food-=tc;addTunnel();showToast('Tunnel dug!');updateShopUI();
};

window.buyAntType=function(id){
  const t=ANT_TYPES.find(x=>x.id===id);if(!t)return;
  const owned=S.antTypes[id]||0;
  if(owned>=t.max)return;
  if(S.food<t.cost)return;
  S.food-=t.cost;
  S.antTypes[id]=(owned+1);
  S.antCount=Math.min(getAntMax()+10,S.antCount+1);
  // Add typed ant
  ants.push(new Ant(id));
  showToast(`${t.name} added!`);updateShopUI();
};

window.buyResearch=function(id){
  const r=RESEARCH.find(x=>x.id===id);if(!r)return;
  if(S.research[id])return;
  if(S.royalJelly<r.cost)return;
  S.royalJelly-=r.cost;S.research[id]=true;
  // Update layer
  if(id==='crystalEx')S.layer=2;
  else if(id==='deepMine'&&S.layer<1)S.layer=1;
  showToast(`${r.name} unlocked!`);updateShopUI();
};

// ── Prestige ──────────────────────────────────────────────────
window.doPrestige=function(){
  const keepFood=S.research.memory?Math.floor(S.food*0.25):0;
  const prevPrestige=S.prestige;
  const prevResearch=Object.assign({},S.research);
  const prevAntTypes=Object.assign({},S.antTypes);
  const prevRJ=S.royalJelly;
  const prevPermMult=S.permMult*1.5;
  S=defState();
  S.food=keepFood;S.prestige=prevPrestige+1;
  S.research=prevResearch;S.antTypes=prevAntTypes;
  S.royalJelly=prevRJ;S.permMult=prevPermMult;
  prestigeShown=false;
  ants=[];syncAnts();
  document.getElementById('prestige-overlay').classList.remove('show');
  showToast(`Colony migrated! ×${S.permMult.toFixed(1)} bonus!`);
  updateShopUI();
};
window.hidePrestige=function(){
  document.getElementById('prestige-overlay').classList.remove('show');
};

});
document.getElementById('shop-close').addEventListener('click',()=>{
  document.getElementById('shop').classList.remove('open');
});

// ── Fullscreen toggle (canvas click top-right) ────────────────
canvas.addEventListener('click',e=>{
  const sx=e.clientX/SCALE,sy=e.clientY/SCALE;
  if(sx>=VW-10&&sx<=VW&&sy>=1&&sy<=10){
    fullscreen=!fullscreen;
    if(fullscreen){
      window.moveTo(0,0);
      window.resizeTo(screen.availWidth,screen.availHeight);
    }else{
      window.resizeTo(270,340);
      window.moveTo(screen.availWidth-280,screen.availHeight-350);
    }
    resizeCanvas();
  }
  // Migrate button click
  if(S.totalFood>=8000){
    const mx=VW/2-18,my=SURFACE_Y-14;
    if(sx>=mx&&sx<=mx+36&&sy>=my&&sy<=my+10){
      document.getElementById('prestige-overlay').classList.add('show');
    }
  }
});

// ── Main game loop ────────────────────────────────────────────
let lastTime=0;
let queenFoodAcc=0;

function gameLoop(ts){
  requestAnimationFrame(gameLoop);
  const dt=Math.min((ts-lastTime)/1000,0.1);
  lastTime=ts;

  // Timers
  if(S.multTimer>0){S.multTimer-=dt;if(S.multTimer<=0){S.mult=1;S.multTimer=0;}}
  if(S.rainTimer>0)S.rainTimer-=dt;
  if(droughtTimer>0)droughtTimer-=dt;
  if(aphidTimer>0){aphidTimer-=dt;addFood(3*dt);}

  // Queen hatch
  S.queenTimer+=dt;
  const hatchBoost=1+(S.upg.queenBoost||0)*0.15;
  const hatchInterval=20/hatchBoost;
  if(S.queenTimer>=hatchInterval&&S.antCount<getAntMax()){
    S.antCount++;syncAnts();S.queenTimer=0;
  }

  // Builder auto-dig
  if((S.antTypes.builder||0)>0){
    S.builderTimer=(S.builderTimer||0)+dt*(S.antTypes.builder);
    if(S.builderTimer>=60){S.builderTimer=0;addTunnel();showToast('Builder dug a tunnel!');}
  }

  // Farmer passive food
  if((S.antTypes.farmer||0)>0){
    addFood(S.antTypes.farmer*0.5*dt);
  }

  // Random event
  S.eventTimer-=dt;
  if(S.eventTimer<=0){
    S.eventTimer=Math.random()*20+15;
    if(!activeEvent)triggerEvent();
  }

  // Evt bar
  if(evtFill&&activeEvent){
    // bar drains visually (CSS handles animation)
  }

  // Update ants
  ants.forEach(a=>a.update(dt));

  // Replenish food spots
  if(Math.random()<0.01*dt*60)spawnFood();

  // Render
  renderWorld();
  renderHUD();

  // Blit virtual canvas → display canvas
  dctx.clearRect(0,0,canvas.width,canvas.height);
  dctx.imageSmoothingEnabled=false;
  dctx.drawImage(vc,0,0,VW,VH,0,0,Math.round(VW*SCALE),Math.round(VH*SCALE));

  // Update shop if open
  if(document.getElementById('shop').classList.contains('open')){
    // Only update every ~30 frames to avoid jank
    if(Math.floor(ts/33)%10===0)updateShopUI();
  }
}

requestAnimationFrame(gameLoop);
</script>
